{% extends "base.html" %}
{% load i18n %}
{% load socialaccount %}
{% load static %}

{% block body_content %}
<div class="container">
    <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-sm-12 col-md-8 col-lg-6 col-xl-5">
            <div class="card shadow-lg border-0 rounded-lg">
                <div class="card-body p-5">
                    <!-- Logo and Title -->
                    <div class="text-center mb-3">
                        <img src="{% static 'images/logo_with_text.svg' %}" alt="Attendee Logo" class="img-fluid" style="min-width: 170px; max-width: 250px;">
                    </div>

                    <!-- Signup Closed Message -->
                    <div class="text-center mb-4">
                        <h4 class="text-dark">Registration Closed</h4>
                        <p class="text-muted mt-3">
                            New account registration is by invitation only.
                        </p>
                        <p class="text-muted">
                            Please contact your team administrator to request an invitation.
                        </p>
                    </div>

                    <!-- Links -->
                    <div class="text-center mt-4">
                        <p class="small mb-0">
                            Already have an account?
                            <a href="{% url 'account_login' %}" class="text-primary">Sign In</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
