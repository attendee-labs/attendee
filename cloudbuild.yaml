# Cloud Build configuration for attendee
#
# This configuration builds and deploys the attendee application to Google Cloud.
# It supports deployment to both Cloud Run and GKE.
#
# Usage:
#   # Deploy to staging
#   gcloud builds submit --config cloudbuild.yaml --substitutions=_ENV=staging
#
#   # Deploy to production
#   gcloud builds submit --config cloudbuild.yaml --substitutions=_ENV=production
#
# Required substitutions:
#   _ENV: Environment (staging or production)
#
# Required secrets (configured in Secret Manager):
#   - ATTENDEE_DATABASE_URL: PostgreSQL connection string
#   - DJANGO_SECRET_KEY: Django secret key
#   - CREDENTIALS_ENCRYPTION_KEY: Encryption key for sensitive data
#   - REDIS_URL: Redis/Memorystore connection (e.g., redis://10.0.0.3:6379)
#
# Required infrastructure:
#   - VPC Connector: For Cloud Run to access Memorystore (private IP)
#   - Memorystore for Redis: Create instance in same region/VPC

substitutions:
  _ENV: staging
  _REGION: us-west2
  _SERVICE_NAME: attendee
  _GKE_CLUSTER: attendee-cluster
  _GKE_ZONE: us-west2-a
  _VPC_CONNECTOR: attendee-vpc-connector

options:
  logging: GCS_ONLY
  machineType: E2_HIGHCPU_8
  substitutionOption: ALLOW_LOOSE

logsBucket: 'gs://oppy-prod_cloudbuild'

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_ENV}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  # Step 2: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'
    waitFor: ['build']

  # Step 3: Run database migrations
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'migrate'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Deploy (create/update) the job first, then execute it
        gcloud run jobs deploy ${_SERVICE_NAME}-migrate \
          --image gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA \
          --region ${_REGION} \
          --vpc-connector ${_VPC_CONNECTOR} \
          --set-env-vars "DJANGO_SETTINGS_MODULE=attendee.settings.production-gke" \
          --set-secrets "DATABASE_URL=ATTENDEE_DATABASE_URL:latest,DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,CREDENTIALS_ENCRYPTION_KEY=CREDENTIALS_ENCRYPTION_KEY:latest,REDIS_URL=REDIS_URL:latest" \
          --command "python" \
          --args "manage.py,migrate,--noinput" \
          --max-retries 0 \
          --task-timeout 600 \
          --quiet && \
        gcloud run jobs execute ${_SERVICE_NAME}-migrate \
          --region ${_REGION} \
          --wait
    waitFor: ['push']

  # Step 4: Collect static files
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'collectstatic'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Deploy (create/update) the job first, then execute it
        gcloud run jobs deploy ${_SERVICE_NAME}-collectstatic \
          --image gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA \
          --region ${_REGION} \
          --vpc-connector ${_VPC_CONNECTOR} \
          --set-env-vars "DJANGO_SETTINGS_MODULE=attendee.settings.production-gke" \
          --set-secrets "DATABASE_URL=ATTENDEE_DATABASE_URL:latest,DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,CREDENTIALS_ENCRYPTION_KEY=CREDENTIALS_ENCRYPTION_KEY:latest" \
          --command "python" \
          --args "manage.py,collectstatic,--noinput" \
          --max-retries 0 \
          --task-timeout 300 \
          --quiet && \
        gcloud run jobs execute ${_SERVICE_NAME}-collectstatic \
          --region ${_REGION} \
          --wait
    waitFor: ['migrate']

  # Step 5: Deploy to Cloud Run (Web Service)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-web'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy ${_SERVICE_NAME}-web \
          --image gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated \
          --port 8000 \
          --cpu 2 \
          --memory 2Gi \
          --min-instances 1 \
          --max-instances 10 \
          --vpc-connector ${_VPC_CONNECTOR} \
          --set-env-vars "DJANGO_SETTINGS_MODULE=attendee.settings.production-gke" \
          --set-secrets "DATABASE_URL=ATTENDEE_DATABASE_URL:latest,DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,CREDENTIALS_ENCRYPTION_KEY=CREDENTIALS_ENCRYPTION_KEY:latest,REDIS_URL=REDIS_URL:latest" \
          --args="gunicorn,attendee.wsgi:application,--bind,0.0.0.0:8000,--workers,4,--threads,2"
    waitFor: ['collectstatic']

  # Step 6: Deploy Celery Worker to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-worker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy ${_SERVICE_NAME}-worker \
          --image gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA \
          --region ${_REGION} \
          --platform managed \
          --no-allow-unauthenticated \
          --cpu 2 \
          --memory 4Gi \
          --min-instances 1 \
          --max-instances 20 \
          --vpc-connector ${_VPC_CONNECTOR} \
          --set-env-vars "DJANGO_SETTINGS_MODULE=attendee.settings.production-gke" \
          --set-secrets "DATABASE_URL=ATTENDEE_DATABASE_URL:latest,DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,CREDENTIALS_ENCRYPTION_KEY=CREDENTIALS_ENCRYPTION_KEY:latest,REDIS_URL=REDIS_URL:latest,CELERY_BROKER_URL=REDIS_URL:latest" \
          --args="celery,-A,attendee,worker,-l,INFO,--concurrency,4"
    waitFor: ['collectstatic']

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_ENV}'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

timeout: 1800s
